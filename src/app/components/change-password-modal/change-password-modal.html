@if (isOpen()) {
  <div class="delete-modal" (click)="close(false)">
    <div class="delete-content" (click)="$event.stopPropagation()">
      <p>{{ 'modals.confirm_change_password' | translate }}</p>
      <div class="delete-actions">
        <button class="confirm-btn" (click)="close(true)">{{ 'modals.change' | translate }}</button>
        <button class="cancel-btn" (click)="close(false)">{{ 'modals.close' | translate }}</button>
      </div>
    </div>
  </div>
}
