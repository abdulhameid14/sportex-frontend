<section class="hero">
  <div class="hero__content">
    <h1 class="hero__title">
      Welcome to <span>SPORTEX ERP</span>
    </h1>

    <p class="hero__subtitle">
      Browse ready-to-use UI modules and components
    </p>

    <div class="hero__search">
      <i class="ri-search-line"></i>
      <input
        type="text"
        placeholder="Search modules..."
        [(ngModel)]="searchValue"
      />
    </div>
  </div>
</section>
