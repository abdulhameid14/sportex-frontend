@if (isOpen()) {
  <div class="modal-overlay" (click)="close()">
    <div class="modal" (click)="$event.stopPropagation()">
      <button class="close-btn" (click)="close()">×</button>
      <div class="modal-header">
        <h2>{{ 'modals.add_strategy' | translate }}</h2>
      </div>
      <div class="modal-body">
        <form #strategyForm="ngForm" (ngSubmit)="submit(strategyForm)">


          <div class="form-group">
            <label>{{ 'common.strategy_details' | translate }}</label>
            <div class="main-details">
              <div class="details-grid">
                <div class="form-group">
                  <label>{{ 'common.title' | translate }}</label>
                  <input type="text" name="title" ngModel required />
                </div>
                <div class="form-group">
                  <label>{{ 'common.department' | translate }}</label>
                  <select name="department" ngModel required>
                    @for (d of departments(); track $index) {
                      <option [ngValue]="d">{{ d.name }}</option>
                    }
                  </select>
                </div>
                <div class="form-group">
                  <label>{{ 'common.budget' | translate }}</label>
                  <input type="number" name="budget" ngModel required />
                </div>
              </div>
              <div class="form-group">
                <label>{{ 'common.description' | translate }}</label>
                <textarea name="description" rows="3" ngModel required></textarea>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>{{ 'common.goals_details' | translate }}</label>
            <div class="main-details">
              <div class="form-group">
                <div class="goals-list">
                  <div class="goal-item" *ngFor="let goal of goals; let i = index; let last = last">
                    <div class="details-grid">
                      <div class="form-group">
                        <label>{{ 'common.goal_name' | translate }}</label>
                        <input type="text" [(ngModel)]="goal.name" name="goalName{{i}}" required />
                      </div>
                      <div class="form-group">
                        <label>{{ 'common.goal_deadline' | translate }}</label>
                        <input type="date" [(ngModel)]="goal.deadline" name="goalDeadline{{i}}" />
                      </div>
                      <div class="form-group">
                        <label>{{ 'common.goal_budget' | translate }}</label>
                        <input type="number" [(ngModel)]="goal.budget" name="goalBudget{{i}}" />
                      </div>
                      <div class="form-group">
                        <label>{{ 'common.goal_expenses' | translate }}</label>
                        <input type="number" [(ngModel)]="goal.expenses" name="goalExpenses{{i}}" />
                      </div>
                      <div class="form-group">
                        <label>{{ 'common.goal_reach' | translate }}</label>
                        <input type="number" [(ngModel)]="goal.reach" name="goalReach{{i}}" />
                      </div>
                    </div>
                    <div class="form-group">
                      <label>{{ 'common.goal_description' | translate }}</label>
                      <textarea rows="2" [(ngModel)]="goal.description" name="goalDescription{{i}}" required></textarea>
                    </div>
                    <button class="btn delete-btn btn-sm" [disabled]="goals.length <= 1" (click)="removeGoal(i)"><i class="fa-solid fa-trash"></i></button>
                    <hr *ngIf="!last" />
                  </div>
                </div>
                <button type="button" class="btn btn-success btn-sm" (click)="addGoal()">{{ 'common.add_goal' | translate }}</button>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>{{ 'common.attachments' | translate }}</label>
            <input type="file" multiple (change)="handleFileInput($event)" />
            <ul *ngIf="attachments.length > 0">
              <li *ngFor="let file of attachments; let i = index">
                {{ file.name }}
                <button type="button" (click)="removeAttachment(i)">×</button>
              </li>
            </ul>
          </div>

          <div class="modal-actions">
            <button type="submit" class="btn btn-primary" [disabled]="strategyForm.invalid">{{ 'common.save' | translate }}</button>
            <button type="button" class="btn btn-secondary" (click)="close()">{{ 'common.cancel' | translate }}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
}
