@if (isOpen()) {
<div class="modal-overlay" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="close()">×</button>
    <div class="modal-header">
      <h2>{{ 'modals.add_task' | translate }}</h2>
    </div>
    <div class="modal-body">
      <form #taskForm="ngForm" (ngSubmit)="submit(taskForm)">
        <div class="form-group">
          <label>{{ 'common.task_details' | translate }}</label>
          <div class="main-details">
            <div class="details-grid">
              <div class="form-group">
                <label>{{ 'common.title' | translate }}</label>
                <input type="text" name="title" ngModel required />
              </div>
              <div class="form-group">
                <label>{{ 'common.department' | translate }}</label>
                <select name="departmentId" ngModel required>
                  @for (d of departments(); track $index) {
                  <option [ngValue]="d.id">{{ d.name }}</option>
                  }
                </select>
              </div>
              <div class="form-group">
                <label>{{ 'common.assigned_to' | translate }}</label>
                <select name="assignedToEmployee" ngModel required>
                  @for (e of employees(); track $index) {
                  <option [ngValue]="e">{{ e.name }}</option>
                  }
                </select>
              </div>
              <div class="form-group">
                <label>{{ 'consultantEmployee' | translate }}</label>
                <select name="consultantEmployee" ngModel required>
                  @for (e of employees(); track $index) {
                  <option [ngValue]="e">{{ e.name }}</option>
                  }
                </select>
              </div>
              <div class="form-group">
                <label>{{ 'common.priority' | translate }}</label>
                <select name="priority" ngModel required>
                  <option>{{ 'status.low' | translate }}</option>
                  <option>{{ 'status.medium' | translate }}</option>
                  <option>{{ 'status.high' | translate }}</option>
                </select>
              </div>
              <div class="form-group">
                <label>{{ 'common.deadline' | translate }}</label>
                <input type="date" name="deadline" ngModel required />
              </div>
            </div>
            <div class="form-group">
              <label>{{ 'common.description' | translate }}</label>
              <textarea name="description" rows="3" ngModel required></textarea>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>{{ 'common.attachments' | translate }}</label>
          <input type="file" multiple (change)="handleFileInput($event)" />
          <ul *ngIf="attachments.length > 0">
            <li *ngFor="let file of attachments; let i = index">
              {{ file.name }}
              <button type="button" (click)="removeAttachment(i)">×</button>
            </li>
          </ul>
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn btn-primary" [disabled]="taskForm.invalid">
            {{ 'common.save' | translate }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="close()">
            {{ 'common.cancel' | translate }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
}
