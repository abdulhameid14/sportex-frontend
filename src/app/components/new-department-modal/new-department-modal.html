@if (isOpen()) {
  <div class="modal-overlay" (click)="close()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ 'modals.add_department' | translate }}</h2>
        <button class="close-btn" (click)="close()">×</button>
      </div>

      <div class="modal-body">
        <form #departmentForm="ngForm" (ngSubmit)="submit(departmentForm)">
          <div class="form-group">
            <label>{{ 'common.name' | translate }}</label>
            <input type="text" name="name" ngModel required />
          </div>
          <div class="modal-actions">
            <button type="submit" class="btn btn-primary" [disabled]="departmentForm.invalid">{{ 'common.save' | translate }}</button>
            <button type="button" class="btn btn-secondary" (click)="close()">{{ 'common.cancel' | translate }}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
}
