@if (isOpen()) {
<div class="modal-overlay" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ 'externalReports.new_external_report' | translate }}</h2>
      <button class="close-btn" (click)="close()">×</button>
    </div>

    <div class="modal-body">
      <form #reportForm="ngForm" (ngSubmit)="submit(reportForm)">
        <div class="form-group">
          <label>{{ 'common.title' | translate }}</label>
          <input type="text" name="title" [(ngModel)]="title" required />
        </div>

        <div class="form-group">
          <label>{{ 'common.content' | translate }}</label>
          <textarea name="content" [(ngModel)]="content" required></textarea>
        </div>

        <div class="form-group">
          <label>{{ 'common.department' | translate }}</label>
          <select name="departmentId" [(ngModel)]="departmentId">
            <option value="">--</option>
            <option *ngFor="let d of departments()" [value]="d.id">{{ d.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>{{ 'common.assigned_to' | translate }}</label>
          <select name="assignedToId" [(ngModel)]="assignedToId">
            <option value="">--</option>
            <option *ngFor="let e of employees()" [value]="e.id">{{ e.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>{{ 'externalReports.document_to_sign' | translate }}</label>
          <input type="file" accept=".doc,.docx" (change)="handleDocsInput($event)" />
          <ul *ngIf="documentToSign.length > 0">
            <li *ngFor="let f of documentToSign; let i = index">
              {{ f.name }} <button type="button" (click)="removeDocument(i)">×</button>
            </li>
          </ul>
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn btn-primary" [disabled]="reportForm.invalid">
            {{ 'common.save' | translate }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="close()">
            {{ 'common.cancel' | translate }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
}
